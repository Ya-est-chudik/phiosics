<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Optics Lab</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="neon-header">Построение изображений в собирающей линзе</div>

<div class="main-layout">
    <div class="simulation-view">
        <canvas id="opticsCanvas"></canvas>
        <div class="zoom-controls">
            <span class="zoom-icon">🔍</span>
            <div class="zoom-buttons">
                <button onclick="changeZoom(1.2)">+</button>
                <button onclick="changeZoom(0.8)">-</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <div class="glass-card">
            <label>Инструменты</label>
            <select id="obj-type">
                <option value="arrow">Стрелка</option>
                <option value="pencil">Карандаш</option>
                <option value="candle">Свеча</option>
                <option value="book">Книга по вайбкодигу</option>
            </select>

            <label>Фокус (F)
                <div class="input-wrapper">
                    <input type="number" id="num-f" class="val-input" th:value="${lensModel.Focus}"> <span>см</span>
                </div>
            </label>
            <input type="range" id="f-range" min="1" max="500" th:value="${lensModel.Focus}">

            <label>Расстояние до предмета (d)
                <div class="input-wrapper">
                    <input type="number" id="num-d" class="val-input" th:value="${lensModel.ObjectDistance}"> <span>см</span>
                </div>
            </label>
            <input type="range" id="d-range" min="1" max="500" th:value="${lensModel.ObjectDistance}">

            <label>Высота (h)
                <div class="input-wrapper">
                    <input type="number" id="num-h" class="val-input" th:value="${lensModel.ObjectHeight}"> <span>см</span>
                </div>
            </label>
            <input type="range" id="h-range" min="1" max="500" th:value="${lensModel.ObjectHeight}">
        </div>

        <div class="glass-card">
            <label>Текущие результаты</label>
            <div class="res-row"><span>Расстояние до изображения (f)</span><span class="res-val" id="r-f">-</span></div>
            <div class="res-row"><span>Высота (H)</span><span class="res-val" id="r-H">-</span></div>
            <div class="res-row"><span>Увеличение (G)</span><span class="res-val" id="r-g">-</span></div>
            <div id="r-type" style="color: var(--accent-purple); font-size: 0.75rem; margin-top: 8px; font-weight: 600; text-transform: uppercase;">-</div>
        </div>

        <div class="glass-card">
            <label>Журнал измерений</label>
            <div style="max-height: 120px; overflow-y: auto;">
                <table>
                    <thead>
                    <tr>
                        <th>№</th>
                        <th>d</th>
                        <th>f</th>
                        <th>F_расч</th>
                    </tr>
                    </thead>
                    <tbody id="log-body">
                    <tr th:each="measure, iterStat : ${measurements}">
                        <td th:text="${iterStat.index + 1}"></td>
                        <td th:text="${#numbers.formatDecimal(measure.objectDistance, 1, 1)}"></td>
                        <td th:text="${#numbers.formatDecimal(measure.imageDistance, 1, 1)}"></td>
                        <td th:text="${#numbers.formatDecimal(measure.calculatedFocus, 1, 2)}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="error-box">
                <div class="err-line">
                    <span>Системная (Δs):</span>
                    <span style="color:#fff" th:text="${errorStats.systematicError} + ' см'">0.10 см</span>
                </div>
                <div class="err-line">
                    <span>Случайная (Δe):</span>
                    <span id="err-exp" style="color:#fff" th:text="${errorStats.randomError} + ' см'">0.00 см</span>
                </div>
                <div class="err-line" style="margin-top:8px; font-weight:600; color:var(--accent-cyan)">
                    <span>ИТОГО ΔF:</span>
                    <span id="err-total" th:text="${errorStats.totalError} + ' см'">0.10 см</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-add" onclick="addMeasurement()">ДОБАВИТЬ</button>
                <button class="btn btn-reset" onclick="resetMeasurements()">СБРОС</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/script.js}"></script>
</body>
</html>
